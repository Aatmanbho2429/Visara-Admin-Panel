<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark — eye -->
  <path d="M 4 24 Q 24 8 44 24 Q 24 40 4 24 Z"
    fill="none" stroke="url(#teal)" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Iris -->
  <circle cx="24" cy="24" r="8.5" fill="none" stroke="url(#teal)" stroke-width="1.8" opacity="0.85"/>

  <!-- Pupil -->
  <circle cx="24" cy="24" r="4.5" fill="url(#teal)" filter="url(#glow)"/>

  <!-- V in pupil -->
  <polyline points="21.5,22 24,26.5 26.5,22"
    fill="none" stroke="#fff" stroke-width="1.4"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="56" y="31"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="22" font-weight="700" letter-spacing="3"
    fill="url(#teal)" filter="url(#glow)">VISARA</text>
</svg>
